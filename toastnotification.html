<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Notification</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body{
            font-family: 'Poppins', sans-serif;
            background:#0a0a0a;
            color:#ffffff;
        }
        .navbar{
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        h1{
            font-size:24px;
            color:#a78bfa;
        }
        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 20px;
            position: relative;
        }
        .nav-links a::after{
            content:'';
            position:absolute;
            bottom:-5px;
            left:0;
            background:blue;
            width:0;
            height:2px;
             transition: width 0.3s ease;
        }
        .nav-links a:hover::after{
            width:100%;
        }
        .content{
           background:#1a1a1a;
            backdrop-filter: blur(10px);
        }
        h2{
            margin-bottom:0px;
            font-size:40px;
        }
        h3{
            margin-top:1px;
            font-size:40px;
            background-image:linear-gradient(to left,#008cff,#e100ff);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        .buttons{
            display:grid;
            grid-template-columns:repeat(2,250px);
            gap:15px;
            margin-top:30px;
            justify-content:start;
        }
        .buttons button{
            height:50px;
            width: 180px;
            border-radius:15px;
            border:0px solid transparent;
            font-size:18px;
            cursor:pointer;
            transition: width 0.3s ease;
            font-weight: 600;
            position:relative;
        }
        .buttons button::after{
            content: '';
            position: absolute;
            height:100%;
            width:100%;
            left:0px;
            top:0px;
            border-radius:15px;
            z-index: -1;
            background-image: linear-gradient(to bottom right,#008cff,#e100ff);
        }
        .buttons button:hover{
            z-index:0;
            transform:translateY(-3px);
            box-shadow:-5px 0px 20px rgba(0,140,255,0.7),
            5px 0px 20px rgba(225,0,255,0.7);
        }
        .btn1 button{
            background:blue;
        }
        .btn2 button{
            background:green;
        }
        .btn3 button{
            background:red;
        }
        .btn4 button{
            background:orange;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.3s, transform 0.3s;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .foot{
            font-family:'Times New Roman', serif;
            margin-top: 0px;
        }
        .foot h4{
            font-size: 30px;
            color: white;
            display:flex;
            justify-content:center;
            margin-bottom: 0px;
        }
        .para{
            display:flex;
            justify-content:center;
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <h1>Toast Notification</h1>
            <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Services</a>
            </div>
        </div>
        <div class="content">
            <h2>Toast Notification</h2>
            <h3>System</h3>
            <p>A simple and beautiful toast notification systme using HTML,CSS and Javascript.</p>
    <div class="buttons">
        <div class="btn1"><button onclick="showToast('Info!','This is an informational message.')">Info</button></div>
        <div class="btn2"><button onclick="showToast('Success!','Your changes have been saved.')">Success</button></div>
        <div class="btn3"><button onclick="showToast('Error!','An error occurred while saving.')">Error</button></div>
        <div class="btn4"><button onclick="showToast('Warning!','Please check your input.')">Warning</button></div>
        <div class="toast"></div>
        </div>
    </header>
    <footer>
        <div class="foot">
        <h4>How it works</h4></div>
        <div class="para">
        <p>Click on any button to show a toast notification.It will automatically disappear after 3 seconds.</p>
        </div>
    </footer>
    <script>
        function showToast(message,msg){
            let t =document.querySelector(".toast");
            t.innerHTML = 
            `<strong>${message}:</strong>
            <p>${msg}</p>`;
            t.classList.add("show");
            setTimeout(()=>t.classList.remove("show"),3000);
        }
    </script>
</body>
</html>
