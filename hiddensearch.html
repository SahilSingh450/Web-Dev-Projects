<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body{
        background:rgba(0,0,0,0.9);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        height:100vh;
        }
        .search-container{
            position: relative;
        }
        @property --angle{
            syntax: "<angle>";
                initial-value: 0deg;
                inherits: false;
        }
        .search-box{
           border-radius:25px ;
           width: 250px;
           height: 45px;
           color:#ccc;
           font-size: 15px;
           font-family: 'Poppins',sans-serif;
           border:2px solid transparent;
           background-image: linear-gradient(#0f172a,#0f172a),linear-gradient(to right,#333333,#1e3a8a);
           background-origin: border-box;
           background-clip: content-box,border-box;
           box-shadow: 15px 0 30px #1e3a8a;
           position: relative;
        }
        button::after, .button::before{
            content: '';
            position:absolute;
            height: 100%;
            width: 100%;
            background-image:linear-gradient(#0f172a,#0f172a),linear-gradient(to right,#333333,#1e3a8a);
            top:50%;
            left: 50%;
            translate: -50% -50%;
            z-index: -1;
            padding: 3px;
            border-radius: 10px;
            animation: 3s spin linear infinite;
        }
        button::before{
            filter: blur(1.5rem);
            opacity:0.5;
        }
        @keyframes spin{
            from{
                --angle:0deg;
            }
            to{
                --angle:360deg;
            }
        }
        .search-container::after{
           content:'';
            position:absolute;
            left:55%;
            transform:translateX(-50%);
            bottom:-70px;
            width:85%;
            height: 40px;
            /*background:linear-gradient(to bottom,#0f172a,#1e3a8a,#334155);*/
            background: radial-gradient(ellipse,rgba(59,130,246,0.6),transparent);
            filter: blur(12px);
        }
        .search-box:hover{
            transform:translateY(-2px);
            box-shadow: 0px 10px 25px rgba(0,0,0.3);
        }
        button{
            border-radius: 50%;
            height: 45px;
            width:45px;
            cursor: pointer;
            transition: 0.3s;
            background-color: black;
            color: #ffffff;
            border:2px solid rgba(255,255,255,0.4);
            background-image: linear-gradient(#0f172a,#0f172a),linear-gradient(to right,#222222,#1e3a8a);
            /*box-shadow: 0 0 15px #3b82f6;*/
            background: (255,255,255,0.05);
        }
        button:hover{
            transform:translateY(-2px);
            box-shadow: 0px 10px 25px rgba(0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="search-container">
        <button class="icon">
            <i class="fa-solid fa-magnifying-glass"></i> 
        </button>
        <input type ="text"
        placeholder="🔍 Search..."
        class="search-box">
        <div class="reflection-glow"></div>
    </div>
    <script>
        let search = document.querySelector(".search-box");
let icon = document.querySelector(".icon");

icon.onclick = () => {
  search.classList.toggle("active");
}
    </script>
</body>
</html>
