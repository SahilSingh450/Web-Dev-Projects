        #hour,#minute,#second{
            position:absolute;
            border-radius:10px;
            background:rgba(0,0,0,0.9);
            transform-origin: bottom;
        }
        #hour{
    height: 29%;
    width: 1.2%;
    top: 21%;
    left: 49.2%;
    opacity: 0.8;
}
#minute{
    height: 35%;
    width: 1.2%;
    top: 15%;
    left: 49.2%;
    opacity: 0.8;
}
#second{
    height: 38%;
    width: 1.2%;
    top: 12%;
    left: 49.2%;
    opacity: 0.8;
}

</head>
<body>
    <div id="clock-container">
        <div id="hour"></div>
        <div id="minute"></div>
        <div id="second"></div>
    </div>
    <script>
        setInterval(()=>{
            d = new Date();
            htime=d.getHours();
            mtime=d.getMinutes();
            stime=d.getSeconds();
            hrotation=30*htime+mtime/2;
            mrotation=6*mtime;
            srotation=6*stime;
            hour.style.transform=`rotate(${hrotation}deg)`;
            minute.style.transform=`rotate(${mrotation}deg)`;
            second.style.transform=`rotate(${srotation}deg)`;
        },1000)
    </script>
